<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Fit Finder">
<title>Fit Finder · Maggie Glaize</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#F5F2EC;--warm-white:#FDFBF7;--sage:#7A8B7F;--sage-light:#EDF0EB;
  --sage-mid:#A8B8AD;--taupe:#C4B9AA;--taupe-light:#F0EBE3;
  --text:#2C2A27;--text-2:#7A7570;--text-3:#ADA9A3;
  --border:#E4DED5;--border-strong:#C8C0B5;--radius:4px;
  --serif:Georgia,'Times New Roman',serif;--sans:-apple-system,'Helvetica Neue',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--cream);color:var(--text);min-height:100vh;font-size:14px;font-weight:300;-webkit-font-smoothing:antialiased;letter-spacing:.01em}
button{font-family:var(--sans);touch-action:manipulation;-webkit-tap-highlight-color:transparent;cursor:pointer}
input{font-family:var(--sans);touch-action:manipulation}

/* HEADER */
.hdr{background:var(--warm-white);border-bottom:.5px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
.brand{font-family:var(--serif);font-size:18px;font-weight:300;letter-spacing:.04em}
.brand em{font-style:italic;color:var(--text-2)}
.steps{display:flex;align-items:center}
.step{display:flex;align-items:center;gap:6px;padding:0 10px;font-size:10px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3)}
.step.active{color:var(--text)}
.step.done{color:var(--sage)}
.snum{width:18px;height:18px;border-radius:50%;border:.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.step.active .snum{border-color:var(--text);background:var(--text);color:var(--warm-white)}
.step.done .snum{border-color:var(--sage);background:var(--sage);color:var(--warm-white)}
.sdiv{width:20px;height:.5px;background:var(--border)}

/* LAYOUT */
.main{max-width:860px;margin:0 auto;padding:32px 20px 80px}
.screen{display:none}.screen.active{display:block}

/* SECTION */
.slabel{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:12px}
.intro{margin-bottom:28px}
.intro h2{font-family:var(--serif);font-size:28px;font-weight:300;font-style:italic;margin-bottom:4px;line-height:1.2}
.intro p{font-size:13px;color:var(--text-2);font-weight:300;line-height:1.7}
.divider{border:none;border-top:.5px solid var(--border);margin:0 0 24px}


/* SPACE GRID */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:28px}
@media(max-width:540px){.sgrid{grid-template-columns:repeat(2,1fr)}}
.stile{background:var(--warm-white);border:.5px solid var(--border);border-radius:var(--radius);padding:18px 10px 14px;text-align:center;width:100%;transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.stile:active{opacity:.7}
.stile.sel{border-color:var(--sage);background:var(--sage-light)}
.stile svg{display:block;margin:0 auto 8px}
.stile-name{font-size:10px;font-weight:400;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3)}
.stile.sel .stile-name{color:var(--sage)}

/* DIMS */
.dcard{background:var(--warm-white);border:.5px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:28px}
.drow{display:flex;gap:10px;align-items:flex-end;margin-bottom:16px;flex-wrap:wrap}
.dgrp{flex:1;min-width:68px}
.dgrp label{display:block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);margin-bottom:6px;font-weight:400}
.dgrp input{width:100%;padding:10px 12px;border:.5px solid var(--border);border-radius:var(--radius);font-size:22px;font-weight:300;color:var(--text);background:var(--cream);outline:none;-webkit-appearance:none;appearance:none}
.dgrp input:focus{border-color:var(--sage);background:var(--warm-white)}
.utog{display:flex;border:.5px solid var(--border);border-radius:var(--radius);overflow:hidden;flex-shrink:0;align-self:flex-end}
.ubtn{padding:10px 16px;font-size:11px;font-weight:400;letter-spacing:.08em;text-transform:uppercase;border:none;background:var(--cream);color:var(--text-3);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.ubtn.active{background:var(--sage);color:var(--warm-white)}
.vprev{background:var(--cream);border:.5px solid var(--border);border-radius:var(--radius);height:86px;display:flex;align-items:center;justify-content:center;overflow:hidden}

/* STORES */
.srow{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap}
.sbtn{padding:8px 18px;border-radius:2px;font-size:11px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;border:.5px solid var(--border);background:var(--warm-white);color:var(--text-2);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.sbtn.active{background:var(--sage);color:var(--warm-white);border-color:var(--sage)}

/* CTA */
.cta{display:flex;justify-content:flex-end;gap:10px;align-items:center;border-top:.5px solid var(--border);padding-top:20px}
.bghost{padding:10px 20px;border-radius:var(--radius);font-size:11px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;border:.5px solid var(--border);background:transparent;color:var(--text-2);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.bprimary{padding:10px 24px;border-radius:var(--radius);font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;border:none;background:var(--sage);color:var(--warm-white);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.bprimary:active{opacity:.8}

/* RESULTS */
.rhdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.rtitle{font-family:var(--serif);font-size:26px;font-weight:300;font-style:italic;line-height:1.2;margin-bottom:3px}
.rsub{font-size:11px;color:var(--text-3);letter-spacing:.04em}
.rctrl{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.ftab{padding:6px 14px;border-radius:2px;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;border:.5px solid var(--border);background:var(--warm-white);color:var(--text-3);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.ftab.active{background:var(--text);color:var(--warm-white);border-color:var(--text)}

/* PRODUCT CARD */
.pcard{background:var(--warm-white);border:.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px;display:flex}
.pcard.perfect{border-left:3px solid var(--sage)}
.pcard.good{border-left:3px solid var(--taupe)}
@media(max-width:560px){.pcard{flex-direction:column}}
.cviz{width:196px;flex-shrink:0;background:var(--cream);border-right:.5px solid var(--border);padding:14px 10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
@media(max-width:560px){.cviz{width:100%;border-right:none;border-bottom:.5px solid var(--border)}}
.cbody{flex:1;padding:16px 18px;min-width:0;display:flex;flex-direction:column}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:3px}
.cname{font-family:var(--serif);font-size:17px;font-weight:400;line-height:1.25}
.cprice{font-family:var(--serif);font-size:14px;font-weight:300;font-style:italic;color:var(--text-2);flex-shrink:0}
.cdims{font-size:11px;color:var(--text-3);margin-bottom:10px;letter-spacing:.03em}
.ctags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.tag{font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:2px}
.tikea{background:#E8EDF5;color:#3A5278}
.tcs{background:var(--taupe-light);color:#7A6550}
.ttgt{background:#F5E8E8;color:#7A3A3A}
.tperf{background:var(--sage-light);color:var(--sage)}
.tgood{background:var(--taupe-light);color:#8A7055}
.tmat{background:var(--cream);color:var(--text-3);border:.5px solid var(--border)}
.tset{background:#EDE8DF;color:#7A5C3A}
.cnote{font-size:12px;color:var(--text-2);line-height:1.7;font-weight:300;flex:1;border-top:.5px solid var(--border);padding-top:10px;margin-top:auto}
.cnote strong{color:var(--text);font-weight:400}
.clink{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--sage);text-decoration:none;display:inline-block;margin-top:8px;border-bottom:.5px solid var(--sage-mid);padding-bottom:1px}
.nores{text-align:center;padding:56px 20px;font-family:var(--serif);font-style:italic;font-size:20px;color:var(--text-3)}
.cviz-scroll{width:100%;display:flex;overflow-x:scroll;scroll-snap-type:x mandatory;scrollbar-width:none;-ms-overflow-style:none;-webkit-overflow-scrolling:touch}
.cviz-scroll::-webkit-scrollbar{display:none}
.cviz-panel{flex-shrink:0;width:100%;scroll-snap-align:start;display:flex;align-items:center;justify-content:center}
.cviz-dots{display:flex;gap:5px;margin-top:4px}
.cviz-dot{width:4px;height:4px;border-radius:50%;background:var(--border);transition:background .2s}
.cviz-dot.active{background:var(--sage-mid)}
</style>
</head>
<body>

<div class="hdr">
  <div class="brand">Organizing <em>with</em> Maggie Glaize</div>
  <div class="steps">
    <div class="step active" id="s1"><div class="snum">1</div>Space</div>
    <div class="sdiv"></div>
    <div class="step" id="s2"><div class="snum">2</div>Measure</div>
    <div class="sdiv"></div>
    <div class="step" id="s3"><div class="snum">3</div>Results</div>
  </div>
</div>

<div class="main">

  <!-- SCREEN 1 -->
  <div class="screen active" id="sc1">
    <div class="intro">
      <h2>What are we organizing?</h2>
      <p>Select your space, enter the dimensions, and we'll find bins that fit.</p>
    </div>

    <div class="slabel">Space type</div>

        <div class="stile-name">Drawer</div>

        <div class="stile-name">Shelf</div>
      </button>
      <button class="stile" data-space="Cabinet" onclick="pickSpace(this)">
        <svg width="34" height="24" viewBox="0 0 34 24" fill="none"><rect x="3" y="1" width="28" height="22" rx="2" stroke="#ADA9A3" stroke-width="1.2"/><line x1="17" y1="1" x2="17" y2="23" stroke="#ADA9A3" stroke-width=".8"/><circle cx="14.5" cy="12" r="1.2" fill="#ADA9A3"/><circle cx="19.5" cy="12" r="1.2" fill="#ADA9A3"/></svg>
        <div class="stile-name">Cabinet</div>
      </button>
      <button class="stile" data-space="Closet" onclick="pickSpace(this)">
        <svg width="34" height="24" viewBox="0 0 34 24" fill="none"><rect x="5" y="1" width="24" height="22" rx="2" stroke="#ADA9A3" stroke-width="1.2"/><line x1="5" y1="8" x2="29" y2="8" stroke="#ADA9A3" stroke-width=".8"/><line x1="5" y1="16" x2="29" y2="16" stroke="#ADA9A3" stroke-width=".8"/></svg>
        <div class="stile-name">Closet</div>
      </button>
      <button class="stile" data-space="Pantry" onclick="pickSpace(this)">
        <svg width="34" height="24" viewBox="0 0 34 24" fill="none"><rect x="2" y="2" width="30" height="21" rx="2" stroke="#ADA9A3" stroke-width="1.2"/><line x1="2" y1="9" x2="32" y2="9" stroke="#ADA9A3" stroke-width=".8"/><line x1="2" y1="16" x2="32" y2="16" stroke="#ADA9A3" stroke-width=".8"/></svg>
        <div class="stile-name">Pantry</div>
      </button>
      <button class="stile" data-space="Under bed" onclick="pickSpace(this)">
        <svg width="34" height="24" viewBox="0 0 34 24" fill="none"><rect x="1" y="13" width="32" height="10" rx="2" stroke="#ADA9A3" stroke-width="1.2"/><line x1="6" y1="13" x2="6" y2="23" stroke="#ADA9A3" stroke-width=".8"/><line x1="28" y1="13" x2="28" y2="23" stroke="#ADA9A3" stroke-width=".8"/><rect x="1" y="7" width="32" height="6" rx="1.5" stroke="#ADA9A3" stroke-width="1.2"/></svg>
        <div class="stile-name">Under bed</div>
      </button>
      <button class="stile" data-space="Desk" onclick="pickSpace(this)">
        <svg width="34" height="24" viewBox="0 0 34 24" fill="none"><rect x="1" y="12" width="32" height="11" rx="2" stroke="#ADA9A3" stroke-width="1.2"/><rect x="9" y="3" width="16" height="9" rx="2" stroke="#ADA9A3" stroke-width="1.2"/></svg>
        <div class="stile-name">Desk area</div>
      </button>
      <button class="stile" data-space="Custom" onclick="pickSpace(this)">
        <svg width="34" height="24" viewBox="0 0 34 24" fill="none"><rect x="1" y="1" width="32" height="22" rx="2" stroke="#ADA9A3" stroke-width="1.2" stroke-dasharray="4 2"/><line x1="17" y1="7" x2="17" y2="17" stroke="#ADA9A3" stroke-width="1.2"/><line x1="12" y1="12" x2="22" y2="12" stroke="#ADA9A3" stroke-width="1.2"/></svg>
        <div class="stile-name">Custom</div>
      </button>
    </div>

    <hr class="divider">
    <div class="slabel">Dimensions</div>
    <div class="dcard">
      <div class="drow">
        <div class="dgrp"><label>Width</label><input type="text" id="dw" placeholder="18" inputmode="decimal" pattern="[0-9.]*" oninput="updatePreview()"></div>
        <div class="dgrp"><label>Depth</label><input type="text" id="dd" placeholder="20" inputmode="decimal" pattern="[0-9.]*" oninput="updatePreview()"></div>
        <div class="dgrp"><label>Height</label><input type="text" id="dh" placeholder="4" inputmode="decimal" pattern="[0-9.]*" oninput="updatePreview()"></div>
        <div class="utog">
          <button class="ubtn active" id="bin" onclick="setUnit('in')">in</button>
          <button class="ubtn" id="bcm" onclick="setUnit('cm')">cm</button>
        </div>
      </div>
      <div class="vprev"><svg id="psvg" width="300" height="80" viewBox="0 0 300 80"></svg></div>
    </div>

    <hr class="divider">
    <div class="slabel">Stores</div>
    <div class="srow">
      <button class="sbtn active" data-store="IKEA" onclick="toggleStore(this)">IKEA</button>
      <button class="sbtn active" data-store="The Container Store" onclick="toggleStore(this)">Container Store</button>
      <button class="sbtn active" data-store="Target" onclick="toggleStore(this)">Target</button>
    </div>

    <div class="cta">
      <button class="bghost" onclick="clearAll()">Clear</button>
      <button class="bprimary" onclick="findMatches()">Find bins that fit</button>
    </div>
  </div>

  <!-- SCREEN 2 -->
  <div class="screen" id="sc2">
    <div class="rhdr">
      <div>
        <div class="rtitle" id="rtitle"></div>
        <div class="rsub" id="rsub"></div>
      </div>
      <div class="rctrl">
        <div id="ftabs" style="display:flex;gap:6px;flex-wrap:wrap"></div>
        <button class="bghost" style="font-size:10px;letter-spacing:.1em;text-transform:uppercase" onclick="goBack()">← New search</button>
      </div>
    </div>
    <div id="rlist"></div>
  </div>

</div>

var unit='in', space='Drawer', allResults=[];

function pickSpace(btn){
  document.querySelectorAll('.stile').forEach(function(t){t.classList.remove('sel')});
  btn.classList.add('sel');
  space=btn.dataset.space;
}

function toggleStore(btn){ btn.classList.toggle('active'); }

function setUnit(u){
  unit=u;
  document.getElementById('bin').classList.toggle('active',u==='in');
  document.getElementById('bcm').classList.toggle('active',u==='cm');
  updatePreview();
}

function getDims(){
  return{
    w:parseFloat(document.getElementById('dw').value)||0,
    d:parseFloat(document.getElementById('dd').value)||0,
    h:parseFloat(document.getElementById('dh').value)||0
  };
}

function toIn(v){ return unit==='cm'?v/2.54:v; }

function updatePreview(){
  var d=getDims(), svg=document.getElementById('psvg');
  if(!d.w||!d.d){svg.innerHTML='';return;}
  var SW=290,SH=74;
  var bw=Math.max(Math.min(d.w*5,SW-40),50);
  var bh=Math.max(Math.min(d.d*2,SH-16),24);
  var x0=(SW-bw)/2, y0=(SH-bh)/2;
  var txt=d.w+' '+unit+' wide × '+d.d+' '+unit+' deep'+(d.h?' × '+d.h+' '+unit+' tall':'');
  svg.innerHTML='<rect x="'+x0+'" y="'+y0+'" width="'+bw+'" height="'+bh+'" rx="2" fill="none" stroke="#7A8B7F" stroke-width="1.5" stroke-dasharray="6 3"/>'
    +'<text x="'+(SW/2)+'" y="'+(y0+bh/2+4)+'" text-anchor="middle" font-family="Jost,sans-serif" font-size="11" font-weight="300" fill="#ADA9A3">'+txt+'</text>';
}


function clearAll(){
  ['dw','dd','dh'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('psvg').innerHTML='';
  document.querySelectorAll('.stile').forEach(function(t,i){t.classList.toggle('sel',i===0)});
  space='Drawer';
}

function findMatches(){
  var d=getDims();
  if(!d.w||!d.d){alert('Please enter at least width and depth.');return;}
  var wi=toIn(d.w),di=toIn(d.d),hi=toIn(d.h);
  var stores=Array.from(document.querySelectorAll('.sbtn.active')).map(function(b){return b.dataset.store});
  if(!stores.length){alert('Please select at least one store.');return;}
  var matched=[];
  products.forEach(function(p){
    var pw=p.unit==='cm'?p.width/2.54:p.width;
    var pd=p.unit==='cm'?p.depth/2.54:p.depth;
    var ph=p.unit==='cm'?p.height/2.54:p.height;
    if(stores.indexOf(p.store)<0)return;
    if(pw>wi||pd>di)return;
    if(hi>0&&ph>hi)return;
    var aw=Math.floor(wi/pw), ad=Math.floor(di/pd);
    var gw=+(wi-aw*pw).toFixed(2);
    var fit=gw<=wi*0.25?'perfect':'good';
    matched.push(Object.assign({},p,{pw:pw,pd:pd,ph:ph,aw:aw,ad:ad,gw:gw,fit:fit,sw:wi,sd:di,sh:hi}));
  });
  matched.sort(function(a,b){
    if(a.fit!==b.fit)return a.fit==='perfect'?-1:1;
    return(b.pw*b.pd)-(a.pw*a.pd);
  });
  allResults=matched;
  showResults(matched,d.w,d.d,d.h);
}

function showResults(matched,w,d,h){
  goScreen(2);
  document.getElementById('rtitle').textContent=matched.length+(matched.length===1?' bin fits':' bins fit')+' your '+space.toLowerCase();
  document.getElementById('rsub').textContent=w+' × '+d+(h?' × '+h:'')+' '+unit;
  var stores=[...new Set(matched.map(function(p){return p.store}))];
  var tabs=document.getElementById('ftabs');
  tabs.innerHTML=['All'].concat(stores).map(function(s){
    var cnt=s==='All'?matched.length:matched.filter(function(p){return p.store===s}).length;
    var lbl=s==='The Container Store'?'Container Store':s;
    return '<button class="ftab'+(s==='All'?' active':'')+'" onclick="filterBy(\''+s+'\')">'+lbl+' ('+cnt+')</button>';
  }).join('');
  renderCards(matched);
}

function filterBy(store){
  document.querySelectorAll('.ftab').forEach(function(t){
    var lbl=store==='The Container Store'?'Container':store;
    t.classList.toggle('active',t.textContent.indexOf(lbl)===0);
  });
  renderCards(store==='All'?allResults:allResults.filter(function(p){return p.store===store}));
}

function renderCards(list){
  var el=document.getElementById('rlist');
  if(!list.length){el.innerHTML='<div class="nores">No products found for these dimensions.</div>';return;}
  el.innerHTML=list.map(function(p){
    var sc=p.store==='IKEA'?'tikea':p.store==='The Container Store'?'tcs':'ttgt';
    var sl=p.store==='The Container Store'?'Container Store':p.store;
    var fc=p.fit==='perfect'?'tperf':'tgood';
    var fl=p.fit==='perfect'?'Perfect fit':'Good fit';
    var dw=unit==='cm'?(p.pw*2.54).toFixed(1):p.pw.toFixed(2);
    var dd=unit==='cm'?(p.pd*2.54).toFixed(1):p.pd.toFixed(2);
    var dh=unit==='cm'?(p.ph*2.54).toFixed(1):p.ph.toFixed(2);
    return '<div class="pcard '+p.fit+'">'
      +'<div class="cviz">'+buildViz(p)+'</div>'
      +'<div class="cbody">'
      +'<div class="ctop"><div class="cname">'+p.name+'</div><div class="cprice">'+p.price+'</div></div>'
      +'<div class="cdims">'+dw+' × '+dd+' × '+dh+' '+unit+'</div>'
      +'<div class="ctags"><span class="tag '+sc+'">'+sl+'</span><span class="tag '+fc+'">'+fl+'</span>'+(p.material?'<span class="tag tmat">'+p.material+'</span>':'')+((p.soldAs||1)>1?'<span class="tag tset">Set of '+p.soldAs+'</span>':'')+'</div>'
      +'<div class="cnote">'+buildNote(p)+(p.url&&p.url!=='#'?'<br><a class="clink" href="'+p.url+'" target="_blank">View product →</a>':'')+'</div>'
      +'</div></div>';
  }).join('');
}

function buildNote(p){
  var u=unit;
  var n='<strong>'+p.aw+'× fit'+(p.aw>1?'s':'')+' side by side</strong>';
  n+=p.gw>0.1?' — '+p.gw.toFixed(1)+' '+u+' to spare.':' — nearly exact width.';
  if(p.ad>1)n+=' Stack <strong>'+p.ad+' deep</strong> front to back.';
  if(p.sh&&p.ph>0){var cl=+(p.sh-p.ph).toFixed(2);if(cl>=0&&cl<0.5)n+=' Snug — '+cl+' '+u+' clearance.';else if(cl>0)n+=' '+cl+' '+u+' headroom above.';}
  if((p.soldAs||1)>1){var sets=Math.ceil(p.aw/p.soldAs);n+=' Sold in sets of '+p.soldAs+' — buy <strong>'+sets+(sets===1?' set':' sets')+'</strong> for the width.';}
  return n;
}

function buildViz(p){
  var VW=176,VH=100,PAD=10;
  var perf=p.fit==='perfect';
  var fill=perf?'#EDF0EB':'#F0EBE3';
  var strk=perf?'#7A8B7F':'#C4B9AA';
  var tc=perf?'#7A8B7F':'#8A7055';

  // top view panel
  var sc=Math.min((VW-PAD*2)/p.sw,(VH-PAD*2-14)/p.sd,5.5);
  var dw=p.sw*sc,dh=p.sd*sc,ox=(VW-dw)/2,oy=(VH-14-dh)/2;
  var bw=p.pw*sc,bd=p.pd*sc,bins='';
  for(var c=0;c<Math.min(p.aw,5);c++){
    for(var r=0;r<Math.min(p.ad,3);r++){
      bins+='<rect x="'+(ox+c*bw).toFixed(1)+'" y="'+(oy+r*bd).toFixed(1)+'" width="'+(bw-1).toFixed(1)+'" height="'+(bd-1).toFixed(1)+'" rx="2" fill="'+fill+'" stroke="'+strk+'" stroke-width=".8"/>';
    }
  }
  if(bw>18)bins+='<text x="'+(ox+bw/2).toFixed(1)+'" y="'+(oy+dh/2+4).toFixed(1)+'" text-anchor="middle" font-family="Jost,sans-serif" font-size="8" fill="'+tc+'">'+p.pw.toFixed(1)+'"</text>';
  var fn=p.aw+'× across'+(p.gw>0.1?' · '+p.gw.toFixed(1)+'" spare':'');
  var topSvg='<svg width="'+VW+'" height="'+VH+'" viewBox="0 0 '+VW+' '+VH+'">'
    +'<rect x="'+ox.toFixed(1)+'" y="'+oy.toFixed(1)+'" width="'+dw.toFixed(1)+'" height="'+dh.toFixed(1)+'" rx="3" fill="none" stroke="#C4B9AA" stroke-width="1.5" stroke-dasharray="5 3"/>'
    +bins
    +'<text x="'+(VW/2)+'" y="'+(oy+dh+12).toFixed(1)+'" text-anchor="middle" font-family="Jost,sans-serif" font-size="8.5" fill="'+tc+'">'+fn+'</text>'
    +'</svg>';

  // side view panel
  var SBH=VH-PAD*2-14,SBW=56,sx=(VW-SBW)/2,sy=PAD;
  var mh=p.sh>0?p.sh:p.ph*1.5,binH=Math.min((p.ph/mh)*SBH,SBH);
  var sv='<svg width="'+VW+'" height="'+VH+'" viewBox="0 0 '+VW+' '+VH+'">';
  if(p.sh>0){
    sv+='<rect x="'+sx+'" y="'+sy+'" width="'+SBW+'" height="'+SBH+'" rx="2" fill="none" stroke="#C4B9AA" stroke-width="1.2" stroke-dasharray="4 2"/>';
    var cl=+(p.sh-p.ph).toFixed(2);
    if(cl>0.1)sv+='<text x="'+(sx+SBW+5)+'" y="'+(sy+(SBH-binH)/2+4).toFixed(1)+'" font-family="Jost,sans-serif" font-size="8" fill="#ADA9A3">'+cl.toFixed(1)+'" clear</text>';
  }
  sv+='<rect x="'+sx+'" y="'+(sy+SBH-binH).toFixed(1)+'" width="'+SBW+'" height="'+binH.toFixed(1)+'" rx="2" fill="'+fill+'" stroke="'+strk+'" stroke-width=".8"/>';
  sv+='<text x="'+(sx+SBW+5)+'" y="'+(sy+SBH-binH/2+4).toFixed(1)+'" font-family="Jost,sans-serif" font-size="8" fill="'+tc+'">'+p.ph.toFixed(1)+'"</text>';
  var slbl=p.sh>0?p.ph.toFixed(1)+'" of '+p.sh.toFixed(1)+'"':p.ph.toFixed(1)+'" tall';
  sv+='<text x="'+(VW/2)+'" y="'+(sy+SBH+12)+'" text-anchor="middle" font-family="Jost,sans-serif" font-size="8.5" fill="'+tc+'">'+slbl+'</text></svg>';

  return '<div class="cviz-scroll" onscroll="updateDots(this)">'
    +'<div class="cviz-panel">'+topSvg+'</div>'
    +'<div class="cviz-panel">'+sv+'</div>'
    +'</div>'
    +'<div class="cviz-dots"><span class="cviz-dot active"></span><span class="cviz-dot"></span></div>';
}

function updateDots(el){
  var dots=el.nextElementSibling.querySelectorAll('.cviz-dot');
  var idx=Math.round(el.scrollLeft/el.offsetWidth);
  dots.forEach(function(d,i){d.classList.toggle('active',i===idx)});
}

function goScreen(n){
  document.querySelectorAll('.screen').forEach(function(s,i){s.classList.toggle('active',i===n-1)});
  var activeStep=n===1?1:3;
  ['s1','s2','s3'].forEach(function(id,i){
    var el=document.getElementById(id);
    el.className='step'+(i+1<activeStep?' done':i+1===activeStep?' active':'');
  });
  window.scrollTo(0,0);
}

function goBack(){ goScreen(1); }

updatePreview();
</script>
</body>
</html>
